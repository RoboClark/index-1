<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relative Clause Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --cream: #f5f0e8;
    --parchment: #ede5d4;
    --rule: #c8b89a;
    --accent: #7a3b1e;
    --correct: #2d5a27;
    --correct-bg: #eaf4e8;
    --wrong: #7a1e1e;
    --wrong-bg: #f4e8e8;
    --neutral-bg: #fff;
  }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background-color: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    border-top: 3px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 1.5rem 0 1.2rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  header .label {
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .progress-bar-wrap {
    background: var(--parchment);
    border-radius: 2px;
    height: 4px;
    margin: 1.5rem 0 0;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .question-card {
    background: var(--neutral-bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 1.8rem 2rem;
    margin-bottom: 1.2rem;
    transition: opacity 0.3s;
  }

  .question-card.answered { opacity: 0.85; }

  .q-header {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 1.1rem;
  }

  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--rule);
    line-height: 1;
    min-width: 2rem;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.55;
    font-weight: 400;
  }

  .q-sentence {
    display: block;
    margin-top: 0.7rem;
    font-style: italic;
    color: #444;
    font-size: 1rem;
    padding-left: 1rem;
    border-left: 2px solid var(--rule);
  }

  .options {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--parchment);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.7rem 1rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.97rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    line-height: 1.45;
  }

  .option-btn:hover:not(:disabled) {
    background: #e8dfc8;
    border-color: #b09070;
    transform: translateX(2px);
  }

  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
    font-weight: 400;
  }

  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .option-btn:disabled { cursor: default; transform: none; }

  .feedback {
    margin-top: 0.9rem;
    font-size: 0.9rem;
    font-style: italic;
    color: #555;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-msg { color: var(--correct); }
  .feedback.wrong-msg { color: var(--wrong); }

  .results {
    display: none;
    background: var(--ink);
    color: var(--cream);
    border-radius: 3px;
    padding: 2.5rem 2rem;
    text-align: center;
    margin-top: 2rem;
  }
  .results.show { display: block; }

  .results h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
  }

  .score-display {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    margin: 1rem 0;
    color: #f5d9a0;
  }

  .score-label {
    font-style: italic;
    font-size: 0.95rem;
    color: var(--rule);
    margin-bottom: 1.5rem;
  }

  .retry-btn {
    background: var(--cream);
    color: var(--ink);
    border: none;
    border-radius: 2px;
    padding: 0.75rem 2rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: #fff; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="label">Grammar &amp; Usage</div>
    <h1>Relative Clause Quiz</h1>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </header>

  <div id="quizContainer"></div>
  <div class="results" id="results">
    <h2>Quiz Complete</h2>
    <div class="score-display" id="scoreDisplay"></div>
    <div class="score-label" id="scoreLabel"></div>
    <button class="retry-btn" onclick="resetQuiz()">Try Again</button>
  </div>
</div>

<script>
const questions = [
  {
    text: "True or false? A relative clause is a multi-word adjective that includes a subject and a verb.",
    options: ["True", "False"],
    correct: 0,
    feedback: "Correct. A relative clause functions like an adjective and contains both a subject and a verb.",
    wrongFeedback: "Not quite. A relative clause does act as a multi-word adjective and does include a subject and a verb."
  },
  {
    text: "True or false? A relative clause usually comes before the noun it modifies.",
    options: ["True", "False"],
    correct: 1,
    feedback: "Correct. A relative clause typically follows the noun it modifies.",
    wrongFeedback: "Not quite. A relative clause comes after the noun it modifies, not before."
  },
  {
    text: "Select the example that contains a relative clause.",
    options: [
      "The dog that barked at the moon.",
      "The dog in the next street.",
      "My mother's new dog is really smart."
    ],
    correct: 0,
    feedback: "Correct. \"that barked at the moon\" is a relative clause modifying \"the dog\".",
    wrongFeedback: "Not quite. Option A contains the relative clause: \"that barked at the moon\"."
  },
  {
    text: "Select the example that contains a relative clause.",
    options: [
      "I regret nothing.",
      "The things that I most regret.",
      "I regret so many decisions."
    ],
    correct: 1,
    feedback: "Correct. \"that I most regret\" is a relative clause modifying \"the things\".",
    wrongFeedback: "Not quite. Option B contains the relative clause: \"that I most regret\"."
  },
  {
    text: "Select the true statement.",
    options: [
      "A relative clause usually starts with a relative pronoun, has a subject and a verb, and tells us something about a noun (or pronoun).",
      "A relative clause gives us essential information about the noun."
    ],
    correct: 0,
    feedback: "Correct. That is the most complete and accurate description of a relative clause.",
    wrongFeedback: "Not quite. Option A gives the fuller and more accurate definition — not all relative clauses are defining (essential)."
  },
  {
    text: "Select the relative pronoun in the following sentence.",
    sentence: "The dog that ate the chicken is looking guilty.",
    options: ["dog", "that", "chicken", "guilty"],
    correct: 1,
    feedback: "Correct. \"That\" is the relative pronoun introducing the relative clause.",
    wrongFeedback: "Not quite. \"That\" is the relative pronoun — it introduces the relative clause \"that ate the chicken\"."
  },
  {
    text: "Select the example with a defining relative clause.",
    options: [
      "The boy who stole your bike has been caught.",
      "The police are questioning Ed Sheeran, who was arrested yesterday."
    ],
    correct: 0,
    feedback: "Correct. \"who stole your bike\" defines which boy — it is essential to the meaning.",
    wrongFeedback: "Not quite. Option A has a defining clause. Option B uses commas, marking it as non-defining (additional information)."
  },
  {
    text: "Select the example with a defining relative clause.",
    options: [
      "The thief who stole the painting turned out to be the artist.",
      "The thief, who gave back the stolen items, was praised for his honesty."
    ],
    correct: 0,
    feedback: "Correct. \"who stole the painting\" is essential — it tells us which thief.",
    wrongFeedback: "Not quite. Option A has a defining clause. The commas in Option B signal a non-defining clause."
  },
  {
    text: "Select the example with a non-defining relative clause.",
    options: [
      "Kindness is the language which the deaf can hear and the blind can see.",
      "True love is like ghosts, which everyone talks about and few have seen."
    ],
    correct: 1,
    feedback: "Correct. The comma before \"which\" in Option B signals a non-defining relative clause.",
    wrongFeedback: "Not quite. Option B is non-defining — the comma before \"which\" shows the clause adds extra information, not essential definition."
  }
];

let answered = 0;
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  answered = 0;
  score = 0;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const qHeader = document.createElement('div');
    qHeader.className = 'q-header';

    const qNum = document.createElement('div');
    qNum.className = 'q-num';
    qNum.textContent = i + 1;

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = q.text;

    if (q.sentence) {
      const sent = document.createElement('span');
      sent.className = 'q-sentence';
      sent.textContent = q.sentence;
      qText.appendChild(sent);
    }

    qHeader.appendChild(qNum);
    qHeader.appendChild(qText);
    card.appendChild(qHeader);

    const optList = document.createElement('ul');
    optList.className = 'options';

    q.options.forEach((opt, j) => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(i, j, btn, optList, feedback);
      li.appendChild(btn);
      optList.appendChild(li);
    });

    card.appendChild(optList);

    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    card.appendChild(feedback);

    container.appendChild(card);
  });

  document.getElementById('results').classList.remove('show');
}

function handleAnswer(qIndex, chosen, btn, optList, feedback) {
  const q = questions[qIndex];
  const allBtns = optList.querySelectorAll('.option-btn');

  allBtns.forEach(b => b.disabled = true);

  if (chosen === q.correct) {
    btn.classList.add('correct');
    feedback.textContent = q.feedback;
    feedback.className = 'feedback show correct-msg';
    score++;
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    feedback.textContent = q.wrongFeedback;
    feedback.className = 'feedback show wrong-msg';
  }

  document.getElementById(`card-${qIndex}`).classList.add('answered');

  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showResults, 600);
  }
}

function updateProgress() {
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function showResults() {
  const results = document.getElementById('results');
  results.classList.add('show');
  document.getElementById('scoreDisplay').textContent = `${score} / ${questions.length}`;
  const pct = Math.round((score / questions.length) * 100);
  let label = '';
  if (pct === 100) label = 'Perfect score — well done.';
  else if (pct >= 78) label = 'A solid result.';
  else if (pct >= 56) label = 'A reasonable attempt — worth reviewing the feedback above.';
  else label = 'Some revision needed — take another look at the explanations.';
  document.getElementById('scoreLabel').textContent = label;
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
